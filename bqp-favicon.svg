<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="bqp.">
  <title>bqp. — favicon</title>
  <desc>Square favicon. Used in browser tabs, app icon grids, and small UI surfaces. Rounded ink square with bqp. wordmark in cream and a sienna-bright period.</desc>
  <rect width="64" height="64" rx="10" fill="#463325"/>
  <text x="32" y="44"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="26"
        font-weight="800"
        letter-spacing="-1.6"
        fill="#F4F1DB"
        text-anchor="middle">bqp<tspan fill="#FF5F00" dx="-1">.</tspan></text>
</svg>
